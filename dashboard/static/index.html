<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Minecraft Command Center</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #e0e0e0; margin: 0; padding: 20px; }
        h1 { color: #4CAF50; text-align: center; }
        #dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #2d2d2d; border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card h2 { margin-top: 0; color: #64b5f6; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .status { font-weight: bold; }
        .running { color: #81c784; }
        .idle { color: #ffd54f; }
        .failed { color: #e57373; }
        pre { background: #000; padding: 10px; border-radius: 4px; overflow-x: auto; font-size: 0.9em; max-height: 200px; }
        .chat-log { max-height: 150px; overflow-y: auto; font-size: 0.8em; color: #aaa; border-top: 1px solid #444; margin-top: 10px; padding-top: 5px; }
        .chat-entry { margin-bottom: 2px; }
    </style>
</head>
<body>
    <h1>AI Minecraft Command Center</h1>
    <div id="connection-status" style="text-align: center; margin-bottom: 20px; color: #777;">Connecting...</div>
    <div id="dashboard">
        <!-- Agent Cards will appear here -->
    </div>

    <script>
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/ws/client`;
        const dashboard = document.getElementById('dashboard');
        const statusDiv = document.getElementById('connection-status');
        let ws;

        function connect() {
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusDiv.innerText = "Connected to Server";
                statusDiv.style.color = "#81c784";
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'init') {
                    // Initial state load
                    dashboard.innerHTML = '';
                    for (const [botId, data] of Object.entries(msg.data)) {
                        updateAgentCard(botId, data);
                    }
                } else if (msg.type === 'update') {
                    updateAgentCard(msg.bot_id, msg.data);
                }
            };

            ws.onclose = () => {
                statusDiv.innerText = "Disconnected. Reconnecting...";
                statusDiv.style.color = "#e57373";
                setTimeout(connect, 3000);
            };
        }

        function updateAgentCard(botId, data) {
            let card = document.getElementById(`agent-${botId}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `agent-${botId}`;
                card.className = 'card';
                dashboard.appendChild(card);
            }

            const actionState = data.action_state || {};
            const statusClass = actionState.status || 'idle';
            
            const chatHtml = (data.chat_history || []).map(c => 
                `<div class="chat-entry"><span style="color:#888">[${new Date(c.time).toLocaleTimeString()}]</span> <b>${c.username}:</b> ${c.message}</div>`
            ).join('');

            card.innerHTML = `
                <h2>${botId}</h2>
                <div>Status: <span class="status ${statusClass}">${statusClass.toUpperCase()}</span></div>
                <div>Mission: ${data.mission || 'Unknown'}</div>
                <div>Position: ${data.position ? `x:${Math.round(data.position.x)} y:${Math.round(data.position.y)} z:${Math.round(data.position.z)}` : 'Unknown'}</div>
                <div>Health: ${Math.round(data.health)} / Food: ${Math.round(data.food)}</div>
                <div style="margin-top: 10px;">
                    <strong>Current Action:</strong>
                    <pre>${JSON.stringify(actionState, null, 2)}</pre>
                </div>
                <div class="chat-log">
                    <strong>Recent Chat:</strong>
                    ${chatHtml}
                </div>
            `;
        }

        connect();
    </script>
</body>
</html>
